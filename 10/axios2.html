<!DOCTYPE html>
<html>
<body>
    <!-- подключение библиотеки axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>        
    <script>
        axios.get('https://vk.com')
            .then(res => console.log('Browser success:', res.status))
            .catch(err => console.log('Browser error:', err.message));
    </script>
</body>
</html>
